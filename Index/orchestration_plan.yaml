


Orchestration Plan: Project Warhammer 2026 Layout
Objective: Automatically generate and style faction-specific subpages based on the "Sketch" reference images located in the /index folder. The final output must strictly follow the visual hierarchy defined in the sketches.

1. Structural Hierarchy (Per Faction)
For each faction (Humans, Chaos, Orks, Necrons, T'au, Aeldari, Tyranids), the orchestrator must follow this specific vertical flow:

A. Header & Introduction (The Lore)
Instruction: Place the Lore Text (Topic 1) at the top of the page.

Asset: Use the faction sketch in /index as the layout reference for typography and alignment.

B. The High-Fidelity Gallery
Instruction: Create a grid gallery containing exactly 8 images.

Naming Convention: Fetch images following the pattern {faction_name}{1-8}.webp/jpg (e.g., spacemarine1.jpg through spacemarine8.jpg or ork1.jpg through ork8.jpg).

C. The War Table (The Arsenal)
Instruction: Insert the Arsenal Text (Topic 2).

Asset: Immediately follow the text with the image named mesa_{faction}.jpg (e.g., mesahumans.jpg, mesatau.jpg).

Note: For Aeldari, this must dynamically switch based on the Toggle State (Asuryani vs. Drukhari).

D. Protection & Resilience (The Defense)
Instruction: Insert the Defense Text (Topic 3).

Asset: Search for and place the image starting with armadura_{faction}.jpg.

E. The Legacy (Current Objectives)
Instruction: Place the Legacy Text (Topic 4).

Asset: Use the "Hero" ending images.

Standard Factions: Look for {faction}final.jpg.

Aeldari Special Case:

If Toggle = Asuryani: Use eldarfinal.jpg (Yvraine).

If Toggle = Drukhari: Use drukarifinal.jpg (Asdrubael Vect).

2. Special Instructions for Aeldari Toggle
The Aeldari page is a dual-state layout. The orchestrator must implement a JS Toggle that swaps:

All 4 text blocks.

The Gallery (8 images for Eldar vs. 8 images for Drukhari).

The specific "Mesa", "Armadura", and "Final" assets for each state.

3. Layout & Styling Guidelines
Reference Sketches: All visual styling (borders, glow effects, fonts) must be extracted from the sketches found in the /index folder.

Colors: Use the signature colors defined in previous iterations (e.g., Necron Green, T'au Orange/Teal, Chaos Crimson).
 

