  # Project: Warhammer 2026 - Galeria de Facções
# Version: 3.0 (Layout Orchestration)
# Target: Google Anti-Gravity Agent

project_objective: "Orquestrar a criação das subpáginas de facções seguindo rigorosamente os esboços na pasta /index."

global_rules:
  - prioritize_layout: "O layout final deve espelhar visualmente o arquivo de esboço (sketch) correspondente em /index."
  - asset_mapping: "Mapear imagens conforme o padrão de nomenclatura definido abaixo."

faction_structure:
  order_of_elements:
    1_lore:
      position: "Header / Início da página"
      content: "Topic 1 (Lore Text)"
      style: "Typography based on faction sketch"

    2_gallery:
      position: "Abaixo da introdução"
      source: "/assets/{faction}/"
      pattern: "{faction}{1-8}.jpg" # Ex: spacemarine1.jpg até spacemarine8.jpg
      requirement: "Exibir exatamente 8 imagens em grid de alta fidelidade"

    3_arsenal:
      position: "Seção Central"
      content: "Topic 2 (Arsenal Text)"
      asset: "mesa{faction}.jpg" # Ex: mesahumans.jpg, mesatau.jpg
      alignment: "Texto explicativo seguido da imagem da mesa de guerra"

    4_defense:
      position: "Seção de Proteção"
      content: "Topic 3 (Defense Text)"
      asset_pattern: "armadura{faction}.jpg" # Ex: armaduranecons.jpg

    5_legacy:
      position: "Rodapé / Fechamento"
      content: "Topic 4 (Legacy Text)"
      asset: "{faction}final.jpg" # Ex: orkfinal.jpg

special_cases:
  aeldari_toggle_system:
    trigger: "JavaScript Toggle Switch (Asuryani vs Drukhari)"
    states:
      asuryani:
        texts: "Aeldari (Clean) Set"
        gallery: "eldar1.jpg to eldar8.jpg"
        mesa: "mesaeldari.jpg"
        final: "eldarfinal.jpg" (Yvraine)
      drukhari:
        texts: "Drukhari (Corrupted) Set"
        gallery: "drukari1.jpg to drukari8.jpg"
        mesa: "mesadrukari.jpg"
        final: "drukarifinal.jpg" (Asdrubael Vect)

technical_guidelines:
  font_extraction: "Analisar fontes nos esboços para CSS (Gothic para Império, Sci-Fi para T'au, etc)"
  glow_effects: "Aplicar box-shadow neon baseado na cor da facção (Verde para Necrons, Roxo para Drukhari)"